[server]
# ВАЖНО: заменить jwt_secret на случайную строку перед деплоем!
jwt_secret=CHANGE_ME_TO_RANDOM_STRING
jwt_expire_minutes=120
host_name=0.0.0.0
port=9300
ssl_enabled=False
public_port=9300

[write_permissions]
# builder может загружать любые пакеты
*/*@*/*: builder

[read_permissions]
# Все могут читать
*/*@*/*: *

[users]
# ВАЖНО: заменить пароли перед деплоем!
builder=builder_password_change_me
reader=reader_password_change_me
